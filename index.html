<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>逃離勞改營</title>
  <style>
    :root {
      --bg-color: #0b1120; 
      --bg-image: url('ChatGPT Image 2026年2月5日 上午11_55_39.png'); 
    }

    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background-color: var(--bg-color);
      background-image: var(--bg-image);
      background-size: cover;
      background-position: center;
      font-family: "Microsoft JhengHei", sans-serif;
    }

    /* --- 前情動畫層 --- */
    #intro-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      color: white;
      cursor: pointer;
    }

    .intro-text {
      font-size: 1.8rem;
      letter-spacing: 3px;
      text-align: center;
      max-width: 80%;
      line-height: 1.8;
      transition: opacity 0.5s ease;
    }

    .click-hint {
      position: absolute;
      bottom: 50px;
      font-size: 0.9rem;
      color: #666;
      opacity: 0; 
      transition: opacity 0.5s ease;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    .game-container {
      position: relative;
      width: 100vw; height: 100vh;
      display: none;
      background-size: cover;
      background-position: center;
    }

    .character-sprite {
      position: absolute;
      bottom: 250px; 
      left: 50%;
      transform: translateX(-50%);
      height: calc(100vh - 280px);
      z-index: 10;
      display: flex;
      justify-content: center;
    }

    .character-sprite img { 
      height: 100%;
      width: auto; 
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
    }

    .dialogue-bar {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 250px;
      background: #111827;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 30px 60px;
      box-sizing: border-box;
      z-index: 50;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
    }
  
    .speaker-name { 
      font-size: 1.3rem; 
      font-weight: bold; 
      margin-bottom: 12px; 
      color: #e2e8f0;
    }

    .dialogue-text { 
      font-size: 1.2rem; 
      line-height: 1.8; 
      margin-bottom: 25px; 
      color: #e2e8f0;
    }

    .choice-btn {
      padding: 10px 25px;
      background: #6366f1;
      color: #fff;
      border: none; 
      border-radius: 6px;
      cursor: pointer; 
      font-size: 1rem;
      transition: all 0.2s;
      margin-right: 10px;
      margin-top: 10px;
    }

    .choice-btn:hover {
        background: #4f46e5;
    }

    #bag-toggle {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 150;
      padding: 10px 20px;
      background: #fbbf24;
      color: #000;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }

    #inventory-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      background: rgba(15, 23, 42, 0.95);
      border: 2px solid #6366f1;
      border-radius: 12px;
      padding: 20px;
      z-index: 200;
      display: none;
      color: white;
      box-shadow: 0 0 50px rgba(0,0,0,0.8);
    }

    .inv-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 8px;
    }

    .hud-label { color: #94a3b8; margin-right: 5px; }
    .hud-value { color: #fbbf24; font-weight: bold; }
    .quest-tag { color: #10b981; }

    .item-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .item-slot {
      width: 75px; height: 75px;
      background: rgba(0,0,0,0.3);
      border: 1px dashed #475569;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
    }

    .item-slot img { width: 35px; height: 35px; margin-bottom: 4px; }
    
    /* 日期與地點顯示層 */
    .ui-top-right {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      z-index: 60;
    }

    #game-day {
      color: #fbbf24;
      background: rgba(0,0,0,0.7);
      padding: 5px 15px;
      border-radius: 4px;
      font-weight: bold;
      border: 1px solid #fbbf24;
    }

    #location {
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 5px 15px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <div id="intro-overlay" onclick="nextIntro()">
    <img id="intro-img" src="" style="max-width: 80%; max-height: 60%; margin-bottom: 20px; display: none; transition: opacity 0.5s ease;">
    <div class="intro-text" id="intro-content">內容載入中...</div>
    <div class="click-hint">點擊螢幕繼續</div>
  </div>

  <main class="game-container" id="game-main">
    <button id="bag-toggle" onclick="toggleInventory()">🎒 背包 / 狀態</button>

    <div id="inventory-panel">
      <div style="font-size:1.5rem; text-align:center; color:#fbbf24; margin-bottom:15px;">個人終端</div>
      <div class="inv-stats">
        <div><span class="hud-label">社會信用點數:</span> <span id="ui-credit" class="hud-value">0</span></div>
        <div><span class="hud-label">金錢:</span> <span class="hud-value">$<span id="ui-money">0</span></span></div>
        <div style="grid-column: span 2;"><span class="hud-label">當前任務:</span> <span id="ui-quest" class="quest-tag">無</span></div>
      </div>
      <div style="text-align:center; padding:8px; background:rgba(255,255,255,0.05); border-radius:8px; margin-bottom:15px;">
        <span class="hud-label">存活天數:</span> <span class="hud-value">第 <span id="ui-day-alt">1</span> 天</span>
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
        <button onclick="saveGame()" style="padding:10px; background:#10b981; border:none; color:white; cursor:pointer; border-radius:4px;">💾 儲存進度</button>
        <button onclick="loadGame()" style="padding:10px; background:#6366f1; border:none; color:white; cursor:pointer; border-radius:4px;">📂 讀取進度</button>
      </div>
      <div class="item-grid" id="item-grid"></div>
      <button onclick="toggleInventory()" style="width:100%; margin-top:20px; padding:10px; background:#475569; border:none; color:white; cursor:pointer; border-radius:4px;">返回遊戲</button>
    </div>

    <div class="ui-top-right">
      <div id="game-day">第 1 天</div>
      <div id="location">地區</div>
    </div>
    
    <div class="character-sprite"><img id="char-img" src="" alt=""></div>
    <section class="dialogue-bar">
      <div class="speaker-name" id="speaker"></div>
      <div class="dialogue-text" id="dialogue"></div>
      <div id="choices"></div>
    </section>
  </main>

  <script>
    // --- 遊戲狀態 ---
    let playerState = { day: 1, credit: 3, money: 100, inventory: [], quests: [], currentNode: 'start'};
    let currentIntroIndex = 0;
    let isTyping = false;
    let timer = null;
    let fullText = "";

    const introLines = [
      { text: "本遊戲可能會引起某些人的不適", img: "" },
      { text: "若有不適請立即關閉此遊戲", img: "" },
      { text: "本遊戲內容皆為製作團隊原創", img: "" },
      { text: "若有雷同，真的不是我們的問題", img: "" },
      { text: "機智楊老生活：逃離勞改營", img: "photo.png" },
      { text: "機智楊老生活逃離勞改營製作小組出品", img: "" },
      { text: "這是一段不為人知的故事...", img: "" },
      { text: "在這裡，自由是奢侈的空氣。", img: "" },
      { text: "你能活著離開這裡嗎？", img: "" }
    ];

    const itemDatabase = {
      "鐵絲": "https://cdn-icons-png.flaticon.com/512/100/100514.png",
      "後門鑰匙": "https://cdn-icons-png.flaticon.com/512/3082/3082043.png"
    };

    // --- 打字機邏輯 ---
    function typeWriter(element, text, speed = 60) {
      clearInterval(timer);
      fullText = text;
      element.textContent = "";
      isTyping = true;
      document.querySelector('.click-hint').style.opacity = 0;

      let i = 0;
      timer = setInterval(() => {
        if (i < text.length) {
          element.textContent += text.charAt(i);
          i++;
        } else {
          finishTyping(element);
        }
      }, speed);
    }

    function finishTyping(element) {
      clearInterval(timer);
      element.textContent = fullText;
      isTyping = false;
      document.querySelector('.click-hint').style.opacity = 1;
    }

    // --- 前情提要導航 ---
    function nextIntro() {
      const content = document.getElementById('intro-content');
      const introImg = document.getElementById('intro-img');
      const hint = document.querySelector('.click-hint');

      if (isTyping) {
        finishTyping(content);
        return;
      }

      currentIntroIndex++;

      if (currentIntroIndex < introLines.length) {
        content.style.opacity = 0;
        introImg.style.opacity = 0;
        hint.style.opacity = 0;

        setTimeout(() => {
          const data = introLines[currentIntroIndex];
          if (data.img) {
            introImg.src = data.img;
            introImg.style.display = "block";
            setTimeout(() => introImg.style.opacity = 1, 50);
          } else {
            introImg.style.display = "none";
          }
          content.style.opacity = 1;
          typeWriter(content, data.text);
        }, 500);
      } else {
        document.getElementById('intro-overlay').style.display = 'none';
        document.getElementById('game-main').style.display = 'block';
        renderNode('start');
      }
    }

    const nodes = {

        location: "勞改營入口",
        speaker: "張教官",
        text: "我是張教官，我是來告訴你們為什麼會來到這裡。",
        charImg: "chang.png",
        bg:"ChatGPT Image 2026年2月5日 上午11_55_39.png",
        action: () => { playerState.quests = ["活下去"]; playerState.day = 1; },
        choices: [{ text: "點擊繼續", next: "next1" }]
      },
      next1: {
        location: "勞改營入口",
        speaker: "張教官",
        text: "因為你們違背我們偉大的楊主席的命令。",
        charImg: "chang.png",
        bg:"ChatGPT Image 2026年2月5日 上午11_55_39.png",
        choices: [{ text: "點擊繼續", next: "next2" }]
      },
      next2: {
        location: "勞改營入口",
        speaker: "張教官",
        text: "現在來講新疆勞改營宣言，我念一遍，你念一遍。",
        charImg: "chang.png",
        bg:"ChatGPT Image 2026年2月5日 上午11_55_39.png",
        choices: [
          { text: "跟著念", next: "speak" },
          { text: "含糊帶過", next: "speaklittle" },
          { text: "不念 ", next: "nospeak" }
        ]
      },
      speak: {
        location: "勞改營入口",
        speaker: "張教官",
        text: "很好，相信你們都清楚規則了，進去吧，後會有期。",
        charImg: "chang.png",
        bg:"ChatGPT Image 2026年2月5日 上午11_55_39.png",
        action: () => { playerState.credit += 1; },
        choices: [
          { text: "進入勞改營", next: "story1" },
          { text: "不要動作", next: "nomove" }
        ]
      },
      speaklittle: {
        location: "勞改營入口",
        speaker: "張教官",
        text: "念大聲一點啦，別在歪樓了。我一個人都比你們大聲！再給你們一次機會。",
        charImg: "chang.png",
        bg:"ChatGPT Image 2026年2月5日 上午11_55_39.png",
        action: () => { playerState.credit -= 1; },
        choices: [
          { text: "跟著念", next: "speak" },
          { text: "不念 ", next: "nospeak" }
        ]
      },
      nospeak: {
        location: "勞改營入口",

      },
      nomove: {
        location: "勞改營入口",

        choices: [{ text: "收起來", next: "story1" }]
      },
      bribe_success: {

        bg:"ChatGPT Image 2026年2月5日 上午11_55_39.png",
        action: () => {
          playerState.money -= 50;

        },

      },
      sleep1: {

      },
      next3: {

      },
      next4: {

          { text: "採很多", next: "many" },
          { text: "偷懶一下，只採一點", next: "little" },
          { text: "不動", next: "nomove2" }]
      },
      many: {
        location: "棉花田",
        speaker: "馮教官",

        charImg: "Feng.png",
        bg:"cotton fields.png",
        action: () => { playerState.credit += 1; playerState.money += 100; },

      little: {

        location: "勞改營內部",
        speaker: "陳教官",
        text: "第一名是我的愛徒，他太棒了，我要給他三十點",
        charImg: "",
        choices: [{ text: "點擊繼續", next: "next12" }]
      },
      game_over_credit: {
        location: "勞改營陰暗的角落",
        speaker: "士兵",
        text: "你被主席認定為無法教化的人。看來你不想活了，讓我助你一臂之力吧。",
        charImg: "Gemini_Generated_Image_suylcdsuylcdsuyl.png",
        bg:"ChatGPT Image 2026年2月5日 上午11_55_39.png",
        choices: [{ text: "重新開始", next: "reset_game" }]
      }
    };
    
    function updateUI() {
      document.getElementById('ui-credit').textContent = playerState.credit;
      document.getElementById('ui-money').textContent = playerState.money;
      document.getElementById('ui-quest').textContent = playerState.quests[playerState.quests.length - 1] || "無";
      
      // 更新日期
      document.getElementById('game-day').textContent = `第 ${playerState.day} 天`;
      document.getElementById('ui-day-alt').textContent = playerState.day;

      const grid = document.getElementById('item-grid');
      grid.innerHTML = "";
      for (let i = 0; i < 8; i++) {
        const slot = document.createElement('div');
        slot.className = "item-slot";
        const itemName = playerState.inventory[i];
        if (itemName) {
          const img = document.createElement('img');
          img.src = itemDatabase[itemName] || "";
          slot.appendChild(img);
          const nameTag = document.createElement('span');
          nameTag.textContent = itemName;
          slot.appendChild(nameTag);
        }
        grid.appendChild(slot);
      }
    }

    function renderNode(nodeId) {
      if(nodeId === 'reset_game') {
        playerState = { day: 1, credit: 3, money: 100, inventory: [], quests: [], currentNode: 'start' };
        nodeId = 'start';
      }

      playerState.currentNode = nodeId; 
      const node = nodes[nodeId];
      if (!node) return;

      if (node.action) node.action();
      updateUI();

      if (playerState.credit <= 0 && nodeId !== 'game_over_credit') {
        renderNode('game_over_credit');
        return;
      }

      // 切換背景圖
      if (node.bg) {
        document.getElementById('game-main').style.backgroundImage = `url('${node.bg}')`;
      }

      document.getElementById('location').textContent = node.location;
      document.getElementById('speaker').textContent = node.speaker;
      
      const dialogueEl = document.getElementById('dialogue');
      typeWriter(dialogueEl, node.text, 30);
  
      const charImg = document.getElementById('char-img');
      if (node.charImg) {
        charImg.src = node.charImg;
        charImg.style.display = "block";
      } else {
        charImg.style.display = "none";
      }

      const choicesEl = document.getElementById('choices');
      choicesEl.innerHTML = "";
      node.choices.forEach(choice => {
        if (choice.condition && !choice.condition()) return;
        const btn = document.createElement('button');
        btn.className = "choice-btn";
        btn.textContent = choice.text;
        btn.onclick = () => renderNode(choice.next);
        choicesEl.appendChild(btn);
      });
    }

    function toggleInventory() {
      const panel = document.getElementById('inventory-panel');
      panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    }

    window.onload = () => {
      typeWriter(document.getElementById('intro-content'), introLines[0].text);
    };

    function saveGame() {
      try {
        const saveData = JSON.stringify(playerState);
        localStorage.setItem('escape_labor_camp_save', saveData);
        alert("進度已儲存！");
      } catch (e) {
        alert("存檔失敗。");
      }
    }
    
    function loadGame() {
      const saveData = localStorage.getItem('escape_labor_camp_save');
      if (!saveData) {
        alert("找不到任何存檔！");
        return;
      }
      try {
        playerState = JSON.parse(saveData);
        if (document.getElementById('inventory-panel').style.display === 'block') toggleInventory();
        renderNode(playerState.currentNode);
        alert("進度已載入！");
      } catch (e) {
        alert("存檔檔案損毀。");
      }
    }
  </script>
</body>
</html>
